<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FF Bio Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050509;--bg2:#0b0b14;--bg3:#10101c;--bg4:#161624;
  --bd:rgba(110,60,255,.14);--bd2:rgba(110,60,255,.3);--bd3:rgba(110,60,255,.5);
  --acc:#7c3fff;--acc2:#ff3f8e;--acc3:#3fffc8;
  --glow:rgba(124,63,255,.4);--glow2:rgba(255,63,142,.3);
  --txt:#f0eeff;--txt2:#a09ac0;--txt3:#5a547a;
  --suc:#3fffc8;--err:#ff4466;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(124,63,255,.04)1px,transparent 1px),
    linear-gradient(90deg,rgba(124,63,255,.04)1px,transparent 1px);
  background-size:28px 28px;pointer-events:none}

.topbar{position:sticky;top:0;z-index:300;background:rgba(5,5,9,.94);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);
  padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.brand-icon{width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--glow)}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-btns{display:flex;gap:6px;flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;
  font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;
  text-decoration:none;border:none;transition:.2s;white-space:nowrap}
.tbtn-how{background:rgba(124,63,255,.1);border:1px solid var(--bd2);color:var(--acc)}
.tbtn:hover{opacity:.8;transform:translateY(-1px)}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(5,5,9,.96);backdrop-filter:blur(18px);
  border-top:1px solid var(--bd);display:flex;
  padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:7px 4px;gap:3px;color:var(--txt3);
  font-size:.9rem;border:none;background:none;cursor:pointer;
  font-family:'Rajdhani',sans-serif;transition:.2s}
.bnav-item .nav-lbl{font-size:.52rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.bnav-item.active{color:var(--acc)}
.bnav-item.active .nav-pip{background:rgba(124,63,255,.15);padding:4px 14px;border-radius:8px}

.main{max-width:480px;margin:0 auto;
  padding:14px 13px calc(68px + env(safe-area-inset-bottom));
  position:relative;z-index:1}

.card{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
  padding:15px;margin-bottom:13px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.35}

.sec-label{display:flex;align-items:center;gap:7px;font-size:.63rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:11px}
.sec-label svg{color:var(--acc);flex-shrink:0}
.badge{margin-left:auto;font-size:.55rem;padding:2px 8px;
  background:rgba(124,63,255,.14);border:1px solid var(--bd2);
  border-radius:20px;color:var(--acc);white-space:nowrap}
.badge-ok{background:rgba(63,255,200,.08)!important;border-color:rgba(63,255,200,.25)!important;color:var(--suc)!important}

.page{display:none}
.page.active{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.inp{width:100%;padding:11px 13px;background:rgba(0,0,0,.42);border:1px solid var(--bd);
  border-radius:10px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:.82rem;transition:.2s}
.inp:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px rgba(124,63,255,.12)}
.inp::placeholder{color:var(--txt3)}
.textarea-bio{width:100%;padding:11px 13px;background:rgba(0,0,0,.48);border:1px solid var(--bd);
  border-radius:10px;color:var(--txt);font-family:'JetBrains Mono',monospace;
  font-size:.8rem;line-height:1.6;resize:vertical;min-height:100px;transition:.2s}
.textarea-bio:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px rgba(124,63,255,.12)}
.char-bar{display:flex;justify-content:flex-end;margin-top:4px;
  font-size:.62rem;color:var(--txt3);font-family:'JetBrains Mono',monospace}

.token-row{display:flex;gap:7px;margin-bottom:10px}
.token-row .inp{flex:1}
.paste-btn{padding:11px 13px;border-radius:10px;background:rgba(124,63,255,.1);
  border:1px solid var(--bd2);color:var(--acc);cursor:pointer;transition:.2s;
  flex-shrink:0;display:flex;align-items:center;justify-content:center}
.paste-btn:hover{background:rgba(124,63,255,.2)}

.info-box{background:rgba(0,0,0,.35);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:10px}
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--bd)}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--txt3);font-size:.72rem}
.info-val{color:var(--suc);font-weight:700;font-size:.8rem;font-family:'JetBrains Mono',monospace}

.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
  padding:12px;border:none;border-radius:11px;font-family:'Rajdhani',sans-serif;
  font-size:.92rem;font-weight:700;letter-spacing:.7px;cursor:pointer;transition:.25s;
  text-transform:uppercase}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--acc),#c83fff);color:#fff;
  box-shadow:0 0 18px rgba(124,63,255,.35)}
.btn-primary:hover{box-shadow:0 0 28px rgba(124,63,255,.5);transform:translateY(-1px)}
.btn-secondary{background:rgba(0,0,0,.38);color:var(--txt2);border:1px solid var(--bd2)}
.btn-secondary:hover{border-color:var(--acc);color:var(--acc)}
.btn-success{background:linear-gradient(135deg,#00c97a,#00e5a0);color:#000;font-weight:800;
  box-shadow:0 0 18px rgba(0,201,122,.28)}
.btn-create-site{background:linear-gradient(135deg,#00c97a,#00e5a0);color:#000;font-weight:800;
  box-shadow:0 0 18px rgba(0,201,122,.28);margin-top:10px}

.fmt-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fmt-btn{padding:6px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--bd);
  color:var(--txt2);font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;
  cursor:pointer;transition:.15s}
.fmt-btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(124,63,255,.1)}

.color-grid{display:flex;flex-wrap:wrap;gap:7px}
.color-dot{width:28px;height:28px;border-radius:7px;border:1.5px solid rgba(255,255,255,.1);
  cursor:pointer;transition:.15s;flex-shrink:0}
.color-dot:hover{transform:scale(1.2);border-color:rgba(255,255,255,.5)}

.grad-list{display:flex;flex-wrap:wrap;gap:6px}
.grad-chip{padding:5px 11px;border-radius:7px;background:var(--bg3);border:1px solid var(--bd);
  font-family:'Rajdhani',sans-serif;font-size:.74rem;font-weight:600;color:var(--txt2);
  cursor:pointer;transition:.15s}
.grad-chip:hover{border-color:var(--acc);color:var(--acc)}

.vbadge-row{display:flex;flex-wrap:wrap;gap:6px}
.vb-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;
  background:var(--bg3);border:1px solid var(--bd);cursor:pointer;transition:.15s}
.vb-chip:hover{border-color:var(--acc)}
.vb-chip .vlbl{font-size:.64rem;color:var(--txt3);font-family:'Rajdhani',sans-serif}

.bio-preview{background:rgba(0,0,0,.5);border:1px solid rgba(124,63,255,.2);border-radius:10px;
  padding:13px;min-height:70px;max-height:150px;overflow-y:auto;
  font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7;
  white-space:pre-wrap;word-break:break-word}
.bio-empty{color:var(--txt3);font-style:italic;font-size:.74rem;text-align:center}

.tpl-list{display:flex;flex-direction:column;gap:10px}
.tpl-card{background:var(--bg3);border:1px solid var(--bd);border-radius:12px;
  padding:12px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.tpl-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:3px 0 0 3px}
.tpl-card:hover{border-color:var(--acc);transform:translateY(-1px)}
.tpl-name{font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--acc);margin-bottom:7px;padding-left:9px}
.tpl-preview{font-size:.8rem;line-height:1.65;padding-left:9px;
  white-space:pre-wrap;word-break:break-word;margin-bottom:5px;max-height:80px;overflow-y:auto}
.tpl-tag{display:inline-block;margin-left:9px;font-size:.55rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--txt3);
  background:rgba(0,0,0,.4);padding:2px 7px;border-radius:20px;border:1px solid var(--bd)}

#toast{position:fixed;top:-55px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  padding:9px 22px;border-radius:30px;font-family:'Rajdhani',sans-serif;
  font-weight:700;font-size:.86rem;z-index:9999;
  transition:top .38s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
  box-shadow:0 8px 22px rgba(124,63,255,.4)}

.modal-bg{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.88);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
  padding:16px;opacity:0;visibility:hidden;transition:.28s}
.modal-bg.show{opacity:1;visibility:visible}
.modal-box{background:var(--bg3);border:1px solid var(--bd2);border-radius:20px;
  padding:22px;max-width:370px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.8);
  transform:translateY(16px);transition:.32s}
.modal-bg.show .modal-box{transform:translateY(0)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;
  text-align:center;margin-bottom:4px;
  background:linear-gradient(90deg,var(--acc3),var(--acc));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-sub{color:var(--txt3);font-size:.78rem;text-align:center;margin-bottom:14px}

.mb10{margin-bottom:10px}
.mt10{margin-top:10px}
</style>
</head>
<body>
<div id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div class="brand-name" id="siteName">FF BIO TOOL</div>
  </div>
  <div class="topbar-btns">
    <button class="tbtn tbtn-how" id="howtoBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Tutorial
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- PAGE: HOME (APPLY) -->
  <div id="page-home" class="page active">
    
    <!-- EAT / Access Token Card -->
    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        EAT / Access Token
        <span class="badge" id="tokenBadge">Not Set</span>
      </div>
      
      <button class="btn btn-primary mb10" onclick="window.open('https://ticket.kiosgamer.co.id/', '_blank')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Get EAT Token
      </button>
      
      <div class="token-row">
        <input type="text" id="tokenInput" class="inp" placeholder="Paste EAT or Access Token here…" oninput="onTokenInput()">
        <button class="paste-btn" onclick="pasteToken()" title="Paste">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        </button>
      </div>
      <div id="fetchingInfo" style="display:none;text-align:center;padding:8px;color:var(--txt3);font-size:.75rem;">
        <span class="spin">&#8635;</span> Fetching player info…
      </div>
      <div id="playerInfo" class="info-box" style="display:none;">
        <div class="info-row"><span class="info-key">UID</span><span class="info-val" id="pUID">—</span></div>
        <div class="info-row"><span class="info-key">Region</span><span class="info-val" id="pRegion">—</span></div>
      </div>
    </div>

    <!-- Bio Text Card -->
    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
        Bio Text
        <span class="badge">Max 300</span>
      </div>
      <textarea id="homeBioText" class="textarea-bio" spellcheck="false" maxlength="300" placeholder="Type bio here…" oninput="updateHomePrev()"></textarea>
      <div class="char-bar"><span id="homeCharCount">0 / 300</span></div>
    </div>

    <!-- Preview Card -->
    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview
      </div>
      <div class="bio-preview" id="homeBioPreview">
        <div class="bio-empty">Type bio above to preview…</div>
      </div>
    </div>

    <button class="btn btn-primary mb10" id="applyBtn" onclick="applyBio()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Apply Bio to Free Fire
    </button>
    <button class="btn btn-secondary" onclick="copyBioText()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy Bio Text
    </button>
    
    <button class="btn btn-create-site mt10" onclick="openCreateSite()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Create Your Own Site
    </button>
  </div>

  <!-- PAGE: EDITOR -->
  <div id="page-editor" class="page">
    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        Format Tags
      </div>
      <div class="fmt-row">
        <button class="fmt-btn" onclick="ins('[b]')"><b>B</b></button>
        <button class="fmt-btn" onclick="ins('[/b]')"><b>/B</b></button>
        <button class="fmt-btn" onclick="ins('[i]')"><i>I</i></button>
        <button class="fmt-btn" onclick="ins('[/i]')"><i>/I</i></button>
        <button class="fmt-btn" onclick="ins('[u]')"><u>U</u></button>
        <button class="fmt-btn" onclick="ins('[/u]')"><u>/U</u></button>
        <button class="fmt-btn" onclick="ins('[c]')">C</button>
        <button class="fmt-btn" onclick="ins('[/c]')">C/</button>
      </div>
      <textarea id="bioText" class="textarea-bio" spellcheck="false" maxlength="300" placeholder="[b][c][FF0000]Your [ffff00]Colorful Bio…" oninput="updateEditorPrev()"></textarea>
      <div class="char-bar"><span id="editorCharCount">0 / 300</span></div>
    </div>

    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
        V Badge — tap to insert
      </div>
      <div class="vbadge-row" id="vBadgeRow"></div>
    </div>

    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
        Colors — tap to insert
      </div>
      <div class="color-grid" id="colorGrid"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <input type="color" id="customColor" value="#ff00ff" style="width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:7px;">
        <button class="fmt-btn" style="flex:1;" onclick="insertCustomColor()">+ Custom Color</button>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Gradient Presets
      </div>
      <div class="grad-list" id="gradList"></div>
    </div>

    <div class="card">
      <div class="sec-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Live Preview
      </div>
      <div class="bio-preview" id="editorBioPreview">
        <div class="bio-empty">Type above to preview…</div>
      </div>
    </div>

    <button class="btn btn-primary mb10" onclick="sendToHome()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Use This Bio — Go to Apply
    </button>
    <button class="btn btn-secondary" onclick="clearEditor()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      Clear Editor
